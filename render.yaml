services:
  - type: web
    name: city-explorer
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: OSRM_URL
        value: https://router.project-osrm.org
