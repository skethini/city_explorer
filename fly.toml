app = "city-explorer"
primary_region = "iad"

[build]

[env]
  OPENAI_MODEL = "gpt-4o-mini"
  OVERPASS_URL = "https://overpass-api.de/api/interpreter"
  OSRM_URL = "https://router.project-osrm.org"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
